name: ai_recipe_app
description: AI Recipe Application - Cook Smart, Eat Healthy
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  flutter_localizations:
    sdk: flutter
  intl: any

  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^13.0.1
  
  # Networking
  dio: ^5.4.0
  
  # UI & Styling
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  lottie: ^3.0.0
  flutter_tts: ^4.0.2
  
  # Icons
  font_awesome_flutter: ^11.0.0
  
  # Others
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.3.1
  url_launcher: ^6.2.6
  share_plus: ^13.2.0
  image_picker: ^1.1.2
  speech_to_text: ^7.4.0
  
  # Firebase & Auth
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_analytics: ^12.4.3
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  generate: true

dependency_overrides:
  path_provider_android: 2.2.14
